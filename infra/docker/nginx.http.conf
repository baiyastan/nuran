# HTTP-only mode: no certs required. Use for first run and ACME webroot.
server {
    listen 80;
    server_name nuranpark.com www.nuranpark.com;

    # Cloudflare real IP (optional: add full CF ranges if needed)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Let's Encrypt ACME challenge (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Health check (exact match; must be above location /)
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # GitHub webhook proxy (internal only)
    location /hooks/ {
        limit_req zone=webhook_limit burst=2 nodelay;
        proxy_pass http://webhook:9000/hooks/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_set_header X-Deploy-Token $http_x_deploy_token;

        proxy_request_buffering off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Frontend SPA - try_files fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API v1 requests to Django backend
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Proxy Django static files (e.g. admin)
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
