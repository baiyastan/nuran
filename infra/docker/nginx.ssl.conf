# HTTP server: ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name nuranpark.com www.nuranpark.com;

    # Let's Encrypt ACME challenge (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server: SPA + API + webhook + static
server {
    listen 443 ssl;
    server_name nuranpark.com www.nuranpark.com;

    # Let's Encrypt certs (must exist before nginx starts)
    ssl_certificate /etc/letsencrypt/live/nuranpark.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nuranpark.com/privkey.pem;

    # TLS: modern only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # GitHub webhook proxy (internal only)
    location /hooks/ {
        proxy_pass http://webhook:9000/hooks/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_set_header X-Deploy-Token $http_x_deploy_token;
        proxy_set_header Content-Type $content_type;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Frontend SPA - try_files fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API v1 requests to Django backend
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Proxy Django static files (e.g. admin)
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
