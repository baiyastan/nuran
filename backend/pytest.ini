[pytest]
DJANGO_SETTINGS_MODULE = config.settings
testpaths = tests
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --strict-markers

markers =
    report_perf: report query-count regression (see docs/REPORTS_PERFORMANCE_BASELINE.md)

